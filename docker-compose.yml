services:
  # One-shot: seeds a pre-configured Ollama credential and a pair of starter
  # workflows (tool-server + summarise-url) into the n8n database on a fresh
  # volume, then activates them. Students land on a working chain without
  # touching any UI. Runs, imports, touches a sentinel, and exits; n8n waits
  # for it to finish. Safe to re-run — the sentinel makes it a no-op after
  # the first successful seed.
  n8n-init:
    image: docker.n8n.io/n8nio/n8n:2.18.2
    container_name: n8n-init
    user: "node"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-init/credentials.json:/tmp/credentials.json:ro
      - ./templates/tool-server.workflow.json:/tmp/workflows/tool-server.workflow.json:ro
      - ./templates/summarise-url.workflow.json:/tmp/workflows/summarise-url.workflow.json:ro
    environment:
      - N8N_ENCRYPTION_KEY=tbl4-classroom-key-2026
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -f /home/node/.n8n/.tbl4-seeded ]; then
          echo "already seeded; skipping"
          exit 0
        fi
        echo "seeding Ollama credential..."
        n8n import:credentials --input=/tmp/credentials.json
        echo "importing starter workflows..."
        n8n import:workflow --separate --input=/tmp/workflows/
        # Do NOT auto-publish. CLI `publish:workflow` in n8n 2.18 prefixes
        # webhook URLs with the workflow ID, which breaks the simple URL
        # pattern our OpenAPI spec and OpenWebUI Tool Server registration
        # rely on. The imported workflows show up as drafts; the student
        # clicks **Publish** in the editor toolbar once per workflow and
        # gets clean `/webhook/openapi.json` + `/webhook/summarise-url`.
        touch /home/node/.n8n/.tbl4-seeded
        echo "done"
    restart: "no"

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.18.2
    container_name: n8n
    depends_on:
      n8n-init:
        condition: service_completed_successfully
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      # Host-shared notes folder. Exercise 9 writes Markdown files here so
      # students can see AI output land on their real filesystem.
      - ./notes:/data/notes
    environment:
      - N8N_ENCRYPTION_KEY=tbl4-classroom-key-2026
      - GENERIC_TIMEZONE=America/New_York
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=true
      - N8N_SECURE_COOKIE=false
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  n8n_data:
